<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INOV Holding — Intranet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body data-page="login">

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-mark">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="4" width="10" height="10" rx="2"/>
            <rect x="18" y="4" width="10" height="10" rx="2" opacity="0.6"/>
            <rect x="4" y="18" width="10" height="10" rx="2" opacity="0.6"/>
            <rect x="18" y="18" width="10" height="10" rx="2"/>
          </svg>
        </div>
        <div class="auth-logo-name">INOV Holding</div>
        <div class="auth-logo-sub">Intranet Corporativa</div>
      </div>

      <!-- Heading -->
      <div class="auth-heading">
        <h1>Bem-vindo de volta</h1>
        <p>Aceda à sua área de trabalho segura</p>
      </div>

      <!-- Alert -->
      <div class="auth-alert" id="loginAlert"></div>

      <!-- Form -->
      <form id="loginForm" novalidate>

        <div class="form-group">
          <label for="loginEmail">Email Corporativo</label>
          <div class="input-icon-wrap">
            <span class="i-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" id="loginEmail" placeholder="utilizador@inov.ao" autocomplete="email" required />
          </div>
        </div>

        <div class="form-group">
          <label for="loginPass">Password</label>
          <div class="input-icon-wrap">
            <span class="i-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="loginPass" placeholder="A sua password" autocomplete="current-password" required />
            <button type="button" class="i-toggle" id="togglePass" aria-label="Mostrar/ocultar password">
              <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <div class="form-meta">
          <label class="remember">
            <input type="checkbox" id="rememberMe" />
            Lembrar-me
          </label>
          <a href="recover.html" class="link-muted">Esqueci a password</a>
        </div>

        <button type="submit" class="btn-auth">Entrar</button>

      </form>

      <div class="auth-divider"><span>ou</span></div>

      <div class="auth-footer">
        Não tem conta? <a href="register.html">Solicitar acesso</a>
      </div>

    </div>

    <div class="auth-back">
      <a href="#">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        INOV Holding · © <span id="footerYear"></span>
      </a>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>document.getElementById('footerYear').textContent = new Date().getFullYear();</script>
</body>
</html>
